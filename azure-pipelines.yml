trigger: none

pr:
  branches:
    include:
      - pruebas

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

# Usar Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'
  displayName: 'Use Python'

# Instalar dependencias
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install dependencies'

# Trigger deploy en Render (DATOS QUEMADOS)
- script: |
    curl -X POST https://api.render.com/v1/services/srv-d7r72ojrjlhs73fjpbg0/deploys \
      -H "Authorization: Bearer TU_API_KEY_AQUI" \
      -H "Content-Type: application/json"
  displayName: 'Trigger Render Deploy'

# Esperar un poco y validar
- script: |
    echo "Esperando despliegue..."
    sleep 15
    curl -f https://work-simulator-t9x7.onrender.com || exit 1
  displayName: 'Health Check'