trigger:
  branches:
    include:
      - desarrollo
      - pruebas
      - main

pr:
  branches:
    include:
      - pruebas

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: var_worksim

stages:

# =========================================================
# STAGE 1 - BUILD Y VALIDACION
# =========================================================
- stage: Build
  displayName: 'Build Application'

  jobs:
  - job: BuildApp
    displayName: 'Install and Validate'

    steps:
    - checkout: self
      persistCredentials: true

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Use Python 3.11'

    - script: |
        echo "Actualizando pip..."
        python -m pip install --upgrade pip

        echo "Instalando dependencias..."
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: |
        echo "Validando aplicación..."
        python -c "import main; print('Aplicación válida ✅')"
      displayName: 'Validate application'


# =========================================================
# STAGE 2 - MIRROR AZURE DEVOPS → GITHUB
# =========================================================
- stage: SyncToGitHub
  displayName: 'Sync Azure DevOps → GitHub'
  dependsOn: Build

  jobs:
  - job: PushMirror
    displayName: 'Push repository to GitHub'

    steps:
    - checkout: self
      persistCredentials: true

    - script: |
        echo "Configurando Git..."

        git config --global user.email "pipeline@devops.com"
        git config --global user.name "Azure DevOps Pipeline"

        echo "Mostrando remotos actuales..."
        git remote -v

        echo "Eliminando remoto github si existe..."
        git remote remove github || true

        echo "Agregando remoto GitHub..."

        git remote add github https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/$(GITHUB_USER)/$(GITHUB_REPO).git

        echo "Enviando código a GitHub..."

        git push github HEAD:main --force

        echo "Mirror completado ✅"
      displayName: 'Push mirror to GitHub'


# =========================================================
# STAGE 3 - TRIGGER RENDER DEPLOY
# =========================================================
- stage: DeployRender
  displayName: 'Deploy to Render'
  dependsOn: SyncToGitHub

  jobs:
  - job: TriggerDeploy
    displayName: 'Trigger Render Deployment'

    steps:
    - script: |
        echo "Disparando deploy en Render..."

        curl -X POST https://api.render.com/v1/services/$(RENDER_SERVICE_ID)/deploys \
          -H "Authorization: Bearer $(RENDER_API_KEY)" \
          -H "Content-Type: application/json"

        echo ""
        echo "Deploy enviado correctamente ✅"

      displayName: 'Trigger Render Deploy'


# =========================================================
# STAGE 4 - HEALTH CHECK
# =========================================================
- stage: HealthCheck
  displayName: 'Validate Deployment'
  dependsOn: DeployRender

  jobs:
  - job: CheckService
    displayName: 'Health Check'

    steps:
    - script: |
        echo "Esperando despliegue de Render..."

        for i in {1..18}
        do
          echo "Intento $i..."

          if curl -s -f https://work-simulator-t9x7.onrender.com > /dev/null; then
            echo "Aplicación disponible ✅"
            exit 0
          fi

          echo "Aplicación aún no disponible..."
          sleep 10
        done

        echo "La aplicación no respondió a tiempo ❌"
        exit 1

      displayName: 'Health Check with Retry'