trigger: none

pr:
  branches:
    include:
      - pruebas

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 👉 pega aquí tu nueva API key SOLO para esta ejecución (puedes borrarla luego)
  RENDER_API_KEY: 'rnd_Jcx9GyS5YXjkixcsjgmwkVYgGyTh'
  RENDER_SERVICE_ID: 'srv-d7r72ojrjlhs73fjpbg0'

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'
  displayName: 'Use Python'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install dependencies'

- script: |
    echo "Disparando deploy en Render..."
    curl -X POST https://api.render.com/v1/services/$(RENDER_SERVICE_ID)/deploys \
      -H "Authorization: Bearer $(RENDER_API_KEY)" \
      -H "Content-Type: application/json"
  displayName: 'Trigger Render Deploy'

- script: |
    echo "Esperando despliegue..."
    sleep 20
    curl -f https://work-simulator-t9x7.onrender.com || exit 1
  displayName: 'Health Check'