trigger:
  branches:
    include:
      - desarrollo
      - pruebas
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: var_worksim

stages:

# =========================================================
# STAGE 1 - VALIDACION
# =========================================================
- stage: Build
  displayName: 'Validate Application'

  jobs:
  - job: Validate
    displayName: 'Validate Python App'

    steps:
    - checkout: self
      persistCredentials: true

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Use Python 3.11'

    - script: |
        echo "Actualizando pip..."
        python -m pip install --upgrade pip

        echo "Instalando dependencias..."
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: |
        echo "Validando aplicación..."
        python -c "import main; print('Aplicación válida ✅')"
      displayName: 'Validate application'


# =========================================================
# STAGE 2 - MIRROR A GITHUB
# =========================================================
- stage: SyncToGitHub
  displayName: 'Sync Azure DevOps → GitHub'

  dependsOn: Build

  jobs:
  - job: PushMirror
    displayName: 'Push Repository Mirror'

    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - script: |
        echo "Configurando Git..."

        git config --global user.email "pipeline@devops.com"
        git config --global user.name "Azure DevOps Pipeline"

        echo "Mostrando remotos..."
        git remote -v

        echo "Eliminando remoto github si existe..."
        git remote remove github || true

        echo "Agregando remoto GitHub..."

        git remote add github https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/$(GITHUB_USER)/$(GITHUB_REPO).git

        echo "Enviando código a GitHub..."

        git push github HEAD:main --force

        echo "Mirror completado correctamente ✅"

      displayName: 'Push to GitHub'


# =========================================================
# STAGE 3 - VALIDAR SINCRONIZACION
# =========================================================
- stage: ValidateMirror
  displayName: 'Validate GitHub Mirror'

  dependsOn: SyncToGitHub

  jobs:
  - job: CompareRepos
    displayName: 'Compare Azure DevOps vs GitHub'

    steps:
    - checkout: self
      persistCredentials: true
      fetchDepth: 0

    - script: |
        echo "Configurando Git..."

        git config --global user.email "pipeline@devops.com"
        git config --global user.name "Azure DevOps Pipeline"

        echo "Agregando remoto GitHub..."

        git remote remove github || true

        git remote add github https://$(GITHUB_USER):$(GITHUB_TOKEN)@github.com/$(GITHUB_USER)/$(GITHUB_REPO).git

        echo "Obteniendo último commit de Azure DevOps..."

        AZURE_COMMIT=$(git rev-parse HEAD)

        echo "Commit Azure:"
        echo $AZURE_COMMIT

        echo "Consultando commit de GitHub..."

        git fetch github main

        GITHUB_COMMIT=$(git rev-parse github/main)

        echo "Commit GitHub:"
        echo $GITHUB_COMMIT

        echo "Comparando commits..."

        if [ "$AZURE_COMMIT" = "$GITHUB_COMMIT" ]; then
          echo "Repositorios sincronizados correctamente ✅"
          exit 0
        else
          echo "ERROR: Los repositorios NO están sincronizados ❌"
          exit 1
        fi

      displayName: 'Validate repository sync'